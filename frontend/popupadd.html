<div id="addCarModal" class="modal-overlay">
  <div class="modal-content">
    <header class="modal-header">
      <h2>เพิ่มรถของคุณ</h2>
      <p>ใส่รายละเอียดรถของคุณเพื่อใช้บริการร้าน WASH UP</p>
    </header>

    <form class="car-form" id="carRegistrationForm">
      <div class="form-group">
        <label><span class="num-badge">1</span> ทะเบียนรถยนต์</label>
        <input
          type="text"
          id="car_plate"
          placeholder="กรอกทะเบียนรถ เช่น กข 1234 กรุงเทพฯ"
          required
        />
      </div>

      <div class="form-group">
        <label><span class="num-badge">2</span> ประเภทรถของคุณ</label>
        <div class="radio-group">
          <label class="radio-item active">
            <input type="radio" name="car_type" value="Sedan" checked />
            <span class="dot"></span> รถเก๋ง
          </label>
          <label class="radio-item">
            <input type="radio" name="car_type" value="SUV/Pickup" />
            <span class="dot"></span> รถกระบะ / SUV
          </label>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label><span class="num-badge">3</span> แบรนด์รถ</label>
          <input
            type="text"
            id="brand"
            placeholder="เช่น HONDA, TOYOTA"
            required
          />
        </div>
        <div class="form-group">
          <label><span class="num-badge">4</span> รุ่นรถ</label>
          <input
            type="text"
            id="model"
            placeholder="เช่น CIVIC, YARIS"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label><span class="num-badge">5</span> สีรถ</label>
        <input
          type="text"
          id="color"
          placeholder="ระบุสีรถ เช่น ดำ, ขาว"
          required
        />
      </div>

      <div class="form-group">
        <label
          ><span class="num-badge">6</span> โน๊ตเพิ่มเติม
          <span>(ไม่บังคับ)</span></label
        >
        <input
          type="text"
          id="note"
          placeholder="ระบุข้อมูลเพิ่มเติม (ถ้ามี)"
        />
      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="btn-cancel"
          onclick="window.history.back()"
        >
          ยกเลิก
        </button>
        <button type="submit" class="btn-save">+ บันทึกข้อมูลรถ</button>
      </div>
    </form>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    // ดึงข้อมูล User จาก LocalStorage (ถ้ามี)
    const user = JSON.parse(localStorage.getItem("user"));

    const radioItems = document.querySelectorAll(".radio-item");

    // Logic การเลือกประเภทรถ (Active State)
    radioItems.forEach((item) => {
      item.addEventListener("click", () => {
        radioItems.forEach((i) => i.classList.remove("active"));
        item.classList.add("active");
        item.querySelector("input").checked = true;
      });
    });

    // Logic การ Submit ข้อมูล
    document
      .getElementById("carRegistrationForm")
      .addEventListener("submit", async (e) => {
        e.preventDefault();

        const carData = {
          user_id: user ? user.user_id : null, // ส่ง id ของคนล็อกอินไป
          car_plate: document.getElementById("car_plate").value,
          car_type: document.querySelector('input[name="car_type"]:checked')
            .value,
          brand: document.getElementById("brand").value.toUpperCase(),
          model: document.getElementById("model").value.toUpperCase(),
          color: document.getElementById("color").value,
          note: document.getElementById("note").value,
        };

        console.log("Sending data:", carData);

        try {
          const response = await fetch("http://localhost:3000/cars/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(carData),
          });

          if (response.ok) {
            alert("เพิ่มรถสำเร็จแล้ว!");
            window.location.href = "booking.html";
          } else {
            alert("บันทึกไม่สำเร็จ กรุณาลองใหม่");
          }
        } catch (error) {
          console.error("Error:", error);
          alert("ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้");
        }
      });
  });
</script>
